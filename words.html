<!DOCTYPE html>

<title>单词练习</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 100%);
    color: #e0e0ff;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* 导航栏 */
  #nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background: rgba(10,10,30,0.9);
    border-bottom: 1px solid #2a2a5a;
    z-index: 100;
  }
  #nav h1 {
    font-size: 18px;
    color: #a0c0ff;
    letter-spacing: 2px;
  }
  #nav .stats {
    display: flex;
    gap: 30px;
    font-size: 14px;
  }
  #nav .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  #nav .label { color: #6060aa; font-size: 11px; text-transform: uppercase; }
  #nav .value { color: #00ffaa; font-size: 16px; font-weight: bold; }

  /* 模式切换 */
  #mode-switch {
    display: flex;
    gap: 10px;
  }
  .mode-btn {
    background: rgba(30,30,60,0.8);
    border: 1px solid #3a3a6a;
    color: #8080aa;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
  }
  .mode-btn:hover { border-color: #6060aa; color: #a0a0dd; }
  .mode-btn.active {
    background: linear-gradient(180deg, #2a2a6a 0%, #1a1a4a 100%);
    border-color: #00ffaa;
    color: #00ffaa;
    box-shadow: 0 0 15px rgba(0,255,170,0.3);
  }

  /* 主内容区 */
  #main {
    margin-top: 70px;
    height: calc(100vh - 70px);
    display: flex;
  }

  /* 左侧：单词列表 */
  #word-list {
    width: 300px;
    background: rgba(10,10,30,0.5);
    border-right: 1px solid #2a2a5a;
    overflow-y: auto;
    padding: 20px;
  }
  #word-list h2 {
    font-size: 14px;
    color: #6060aa;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .word-item {
    padding: 10px 15px;
    margin-bottom: 8px;
    background: rgba(30,30,60,0.5);
    border: 1px solid #2a2a5a;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .word-item:hover {
    border-color: #4a4a8a;
    background: rgba(40,40,80,0.6);
  }
  .word-item.practiced {
    border-color: #00ffaa;
    color: #00ffaa;
  }
  .word-item.practiced::after {
    content: '✓';
    font-size: 12px;
  }

  /* 右侧：练习区 */
  #practice-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  /* 练习模式 */
  #practice-mode {
    display: none;
    width: 100%;
    max-width: 600px;
    text-align: center;
  }
  #practice-mode.active { display: block; }

  #target-word {
    font-size: 72px;
    font-weight: bold;
    color: #a0c0ff;
    text-shadow: 0 0 30px rgba(160,192,255,0.5);
    margin-bottom: 40px;
    letter-spacing: 8px;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #input-display {
    font-size: 48px;
    font-weight: bold;
    color: #00ffaa;
    letter-spacing: 8px;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
  }
  #input-display.error { color: #ff4466; }

  #progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(30,30,60,0.8);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 30px;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00ffaa, #00cc88);
    width: 0%;
    transition: width 0.3s ease;
  }

  .practice-controls {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
  }
  .control-btn {
    background: linear-gradient(180deg, #2a2a6a 0%, #1a1a4a 100%);

    color: #00ffaa;

// 解析单词（过滤掉单个字母的标题）
const allWords = wordData.split('\n').map(w => w.trim()).filter(w => w && w.length > 1);
const letterGroups = {};
let currentLetter = '';

wordData.split('\n').forEach(w => {
  w = w.trim();
  if (!w) return;
  if (w.length === 1) {
    currentLetter = w;
    letterGroups[currentLetter] = [];
  } else if (currentLetter) {
    letterGroups[currentLetter].push(w);
  }
});

// 状态管理
let currentMode = 'practice';
let currentWordIndex = 0;
let currentInput = '';
let practicedWords = new Set();
let correctCount = 0;
let totalAttempts = 0;
let isPaused = true;

// 语音设置
let voiceEnabled = true;
let voiceVolume = 0.8;
let speechSynth = window.speechSynthesis;
let voices = [];
let voiceInitialized = false;

// 初始化语音引擎
function initVoice() {
  if (voiceInitialized) return;
  
  if (!speechSynth) {
    console.warn('浏览器不支持语音合成');
    return;
  }
  
  // 获取可用语音
  voices = speechSynth.getVoices();
  
  // 某些浏览器需要异步加载语音列表
  if (voices.length === 0) {
    speechSynth.onvoiceschanged = () => {
      voices = speechSynth.getVoices();
    };
  }
  
  voiceInitialized = true;
}

// 播放单词读音
function speakWord(word) {
  if (!voiceEnabled || !speechSynth) return;
  
  // 确保语音已初始化
  initVoice();
  
  // 取消之前的朗读
  speechSynth.cancel();
  
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = 'en-US';
  utterance.volume = voiceVolume;
  utterance.rate = 0.9;
  utterance.pitch = 1;
  
  // 尝试使用英语语音
  const enVoice = voices.find(v => v.lang.includes('en-US') || v.lang.includes('en-GB'));
  if (enVoice) {
    utterance.voice = enVoice;
  }
  
  // 确保在用户交互后播放
  setTimeout(() => {
    speechSynth.speak(utterance);
  }, 50);
}

// DOM 元素
const targetWordEl = document.getElementById('target-word');
const inputDisplayEl = document.getElementById('input-display');
const progressFillEl = document.getElementById('progress-fill');
const wordItemsEl = document.getElementById('word-items');
const browseGridEl = document.getElementById('browse-grid');
const totalCountEl = document.getElementById('total-count');
const practicedCountEl = document.getElementById('practiced-count');
const accuracyEl = document.getElementById('accuracy');

// 初始化
function init() {
  totalCountEl.textContent = allWords.length;
  renderWordList();
  renderBrowseGrid();
  updateStats();
}

// 渲染单词列表
function renderWordList() {
  wordItemsEl.innerHTML = '';
  Object.entries(letterGroups).forEach(([letter, words]) => {
    const groupEl = document.createElement('div');
    groupEl.innerHTML = `<div style="color:#4a4a8a;font-size:12px;margin:15px 0 8px 0;font-weight:bold;">${letter}</div>`;
    wordItemsEl.appendChild(groupEl);
    
    words.forEach(word => {
      const item = document.createElement('div');
      item.className = 'word-item' + (practicedWords.has(word) ? ' practiced' : '');
      item.textContent = word;
      item.onclick = () => startWord(word);
      wordItemsEl.appendChild(item);
    });
  });
}

// 渲染浏览网格
function renderBrowseGrid() {
  browseGridEl.innerHTML = '';
  Object.entries(letterGroups).forEach(([letter, words]) => {
    words.forEach(word => {
      const item = document.createElement('div');
      item.className = 'browse-item';
      item.innerHTML = `${word}<div class="letter-tag">${letter}</div>`;
      item.onclick = () => {
        switchMode('practice');
        startWord(word);
      };
      browseGridEl.appendChild(item);
    });
  });
}

// 开始练习某个单词
function startWord(word) {
  currentWordIndex = allWords.indexOf(word);
  if (currentWordIndex === -1) currentWordIndex = 0;
  isPaused = false;
  resetCurrentWord();
}

// 重置当前单词状态
function resetCurrentWord() {
  currentInput = '';
  const word = allWords[currentWordIndex];
  targetWordEl.textContent = word;
  inputDisplayEl.textContent = '';
  inputDisplayEl.classList.remove('error');
  updateProgress();
}

// 更新进度条
function updateProgress() {
  const word = allWords[currentWordIndex];
  const progress = word ? (currentInput.length / word.length) * 100 : 0;
  progressFillEl.style.width = progress + '%';
}

// 更新统计
function updateStats() {
  practicedCountEl.textContent = practicedWords.size;
  const accuracy = totalAttempts > 0 ? Math.round((correctCount / totalAttempts) * 100) : 0;
  accuracyEl.textContent = accuracy + '%';
}

// 切换到下一个单词
function nextWord() {
  currentWordIndex = (currentWordIndex + 1) % allWords.length;
  resetCurrentWord();
}

// 随机打乱
function shuffleWords() {
  for (let i = allWords.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allWords[i], allWords[j]] = [allWords[j], allWords[i]];
  }
  currentWordIndex = 0;
  resetCurrentWord();
}

// 切换模式
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  document.getElementById('practice-mode').classList.toggle('active', mode === 'practice');
  document.getElementById('browse-mode').classList.toggle('active', mode === 'browse');
  document.getElementById('hint').style.display = mode === 'practice' ? 'block' : 'none';
}

// 处理键盘输入
document.addEventListener('keydown', (e) => {
  if (currentMode !== 'practice') return;
  
  // 初始化语音引擎（需要用户交互）
  initVoice();
  
  // 空格开始
  if (e.code === 'Space' && isPaused) {
    e.preventDefault();
    isPaused = false;
    if (!targetWordEl.textContent || targetWordEl.textContent === '按空格开始') {
      resetCurrentWord();
    }
    return;
  }
  
  if (isPaused) return;
  
  // 下一个单词
  if (e.key === 'ArrowRight') {
    nextWord();
    return;
  }
  
  // 随机
  if (e.key.toLowerCase() === 'r') {
    shuffleWords();
    return;
  }
  
  const word = allWords[currentWordIndex];
  
  // 退格
  if (e.key === 'Backspace') {
    currentInput = currentInput.slice(0, -1);
    inputDisplayEl.textContent = currentInput;
    inputDisplayEl.classList.remove('error');
    updateProgress();
    return;
  }
  
  // 忽略控制键
  if (e.key.length > 1 || e.ctrlKey || e.altKey || e.metaKey) return;
  
  const expected = word[currentInput.length];
  currentInput += e.key;
  inputDisplayEl.textContent = currentInput;
  
  totalAttempts++;
  
  if (e.key.toLowerCase() === expected.toLowerCase()) {
    inputDisplayEl.classList.remove('error');
    correctCount++;
    
    // 完成单词
    if (currentInput.length === word.length) {
      practicedWords.add(word);
      renderWordList();
      updateStats();
      
      // 播放单词读音
      speakWord(word);
      
      targetWordEl.classList.add('success-anim');
      setTimeout(() => {
        targetWordEl.classList.remove('success-anim');
        nextWord();
      }, 300);
    }
  } else {
    inputDisplayEl.classList.add('error');
    setTimeout(() => {
      currentInput = currentInput.slice(0, -1);
      inputDisplayEl.textContent = currentInput;
      inputDisplayEl.classList.remove('error');
    }, 200);
  }
  
  updateProgress();
  updateStats();
});

// 按钮事件
document.getElementById('next-btn').addEventListener('click', nextWord);
document.getElementById('shuffle-btn').addEventListener('click', shuffleWords);
document.getElementById('reset-btn').addEventListener('click', () => {
  practicedWords.clear();
  correctCount = 0;
  totalAttempts = 0;
  currentWordIndex = 0;
  isPaused = true;
  targetWordEl.textContent = '按空格开始';
  inputDisplayEl.textContent = '';
  progressFillEl.style.width = '0%';
  renderWordList();
  updateStats();
});

// 模式切换按钮
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

// 语音控制事件
const voiceToggleBtn = document.getElementById('voice-toggle');
const volumeSlider = document.getElementById('volume-slider');
const volumeLabel = document.getElementById('volume-label');

voiceToggleBtn.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  voiceToggleBtn.classList.toggle('active', voiceEnabled);
  voiceToggleBtn.textContent = voiceEnabled ? '🔊' : '🔇';
});

volumeSlider.addEventListener('input', (e) => {
  voiceVolume = e.target.value / 100;
  volumeLabel.textContent = e.target.value + '%';
});

// 页面加载时预初始化语音
document.addEventListener('click', function initVoiceOnFirstClick() {
  initVoice();
  document.removeEventListener('click', initVoiceOnFirstClick);
}, { once: true });

// 尝试立即加载语音（某些浏览器支持）
if (speechSynth && speechSynth.onvoiceschanged !== undefined) {
  speechSynth.onvoiceschanged = () => {
    voices = speechSynth.getVoices();
  };
}

// 启动
init();
</script>
